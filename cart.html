<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/pages/cart.css">
    <script type="module" src="./src/js/pages/cart.js"></script>
  </head>
  <body>
    <header class="site__header"></header>
    <main>
      <h1>장바구니</h1>

      <section class="header_product_control">
        <div class="product_quantity">품목수 : 3개</div>
        <div class="select_delete">
          <button type="button" tag="btn_select_all">
            <span>
              <svg
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-check-icon lucide-check"
              >
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </span>전체 선택
          </button>
          <button type="button" tag="btn_select_all">
            <span>
              <svg
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-trash2-icon lucide-trash-2"
              >
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                <path d="M3 6h18" />
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              </svg>
            </span>선택 삭제
          </button>
        </div>
      </section>

      <section>추천상품</section>

      <section class="incart_product">
        <ul>
          <li>
            <article>
              <!-- biome-ignore lint/a11y/noSvgWithoutTitle: <explanation> -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-square-icon lucide-square"
              >
                <rect width="18" height="18" x="3" y="3" rx="2" />
              </svg>
              브랜드 상품이름 000000원
              <button type="button" class="btn_decrease_quantity">
                <svg
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-minus-icon lucide-minus"
                >
                  <path d="M5 12h14" />
                </svg>
              </button>
              <label for="current_quantity">1</label>
              <button type="button" class="btn_add_quantity">
                <svg
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-plus-icon lucide-plus"
                >
                  <path d="M5 12h14" />
                  <path d="M12 5v14" />
                </svg>
              </button>
            </article>
          </li>
          <li>
            <article>
              <svg
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-square-check-icon lucide-square-check"
              >
                <rect width="18" height="18" x="3" y="3" rx="2" />
                <path d="m9 12 2 2 4-4" />
              </svg>
              브랜드 상품이름 000000원 마 1 플
            </article>
          </li>
        </ul>
      </section>

      <aside>
        <h2>주문 요약</h2>
        <p>총 상품금액</p>
        <p>배송비</p>
        <p>총 결제금액</p>

        <button type="submit">구매 결정</button>
      </aside>
      <section>
        <h2>이런 상품은 어떠세요?</h2>

        <ul>
          <li>
            <img src="images/3.webp" alt="상품">
          </li>
        </ul>
      </section>
    </main>
    <footer></footer>
  </body>
  <footer class="site__footer"></footer>
</html>
